<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="297mm" height="210mm"
     viewBox="0 0 297 210">

  <defs>
    <style type="text/css">
      @font-face {
        font-family: 'Clash Display';
        src: url('../client/public/fonts/ClashDisplay-Variable.woff2') format('woff2');
        font-weight: 200 700;
        font-style: normal;
      }
      @font-face {
        font-family: 'Archivo';
        src: url('../client/public/fonts/Archivo-Variable.woff2') format('woff2');
        font-weight: 100 900;
        font-style: normal;
      }
    </style>
  </defs>

  <!-- ============================================================ -->
  <!-- PANEL 1: EXTRAS (x=0, 99mm x 210mm) — Gray background       -->
  <!-- ============================================================ -->
  <g id="panel-extras" transform="translate(0,0)">
    <rect id="panel-extras-bg" x="0" y="0" width="99" height="210" fill="#f3f4f6"/>

    <!-- Title -->
    <text id="extras-title" x="49.5" y="14" text-anchor="middle"
          font-family="Clash Display" font-size="12" font-weight="600" fill="#1C2B42">
      Extras
    </text>

    <!-- 2x3 grid of extras, starting y=20 -->
    <g id="extras-grid">
      <!-- Row 1 -->
      <!-- Cooler -->
      <g id="extra-cooler" transform="translate(5, 20)">
        <rect x="0" y="0" width="42" height="36" rx="3" ry="3" fill="#ffffff"/>
        <circle cx="21" cy="12" r="6" fill="#A8C4DD"/>
        <text x="21" y="26" text-anchor="middle"
              font-family="Archivo" font-size="5.5" font-weight="700" fill="#1C2B42">Cooler</text>
        <text x="21" y="32" text-anchor="middle"
              font-family="Archivo" font-size="5.5" font-weight="700" fill="#A8C4DD">5&#8364;</text>
      </g>
      <!-- Drinks -->
      <g id="extra-drinks" transform="translate(52, 20)">
        <rect x="0" y="0" width="42" height="36" rx="3" ry="3" fill="#ffffff"/>
        <circle cx="21" cy="12" r="6" fill="#60a5fa"/>
        <text x="21" y="26" text-anchor="middle"
              font-family="Archivo" font-size="5.5" font-weight="700" fill="#1C2B42">Drinks</text>
        <text x="21" y="32" text-anchor="middle"
              font-family="Archivo" font-size="5.5" font-weight="700" fill="#A8C4DD">2.50&#8364;/ea</text>
      </g>

      <!-- Row 2 -->
      <!-- Snorkel -->
      <g id="extra-snorkel" transform="translate(5, 60)">
        <rect x="0" y="0" width="42" height="36" rx="3" ry="3" fill="#ffffff"/>
        <circle cx="21" cy="12" r="6" fill="#34d399"/>
        <text x="21" y="26" text-anchor="middle"
              font-family="Archivo" font-size="5.5" font-weight="700" fill="#1C2B42">Snorkel</text>
        <text x="21" y="32" text-anchor="middle"
              font-family="Archivo" font-size="5.5" font-weight="700" fill="#A8C4DD">7.50&#8364;</text>
      </g>
      <!-- Paddle Board -->
      <g id="extra-paddle" transform="translate(52, 60)">
        <rect x="0" y="0" width="42" height="36" rx="3" ry="3" fill="#ffffff"/>
        <circle cx="21" cy="12" r="6" fill="#fbbf24"/>
        <text x="21" y="26" text-anchor="middle"
              font-family="Archivo" font-size="5.5" font-weight="700" fill="#1C2B42">Paddle Board</text>
        <text x="21" y="32" text-anchor="middle"
              font-family="Archivo" font-size="5.5" font-weight="700" fill="#A8C4DD">25&#8364;</text>
      </g>

      <!-- Row 3 -->
      <!-- Seascooter -->
      <g id="extra-seascooter" transform="translate(5, 100)">
        <rect x="0" y="0" width="42" height="36" rx="3" ry="3" fill="#ffffff"/>
        <circle cx="21" cy="12" r="6" fill="#f472b6"/>
        <text x="21" y="26" text-anchor="middle"
              font-family="Archivo" font-size="5.5" font-weight="700" fill="#1C2B42">Seascooter</text>
        <text x="21" y="32" text-anchor="middle"
              font-family="Archivo" font-size="5.5" font-weight="700" fill="#A8C4DD">50&#8364;</text>
      </g>
      <!-- Parking -->
      <g id="extra-parking" transform="translate(52, 100)">
        <rect x="0" y="0" width="42" height="36" rx="3" ry="3" fill="#ffffff"/>
        <circle cx="21" cy="12" r="6" fill="#a78bfa"/>
        <text x="21" y="26" text-anchor="middle"
              font-family="Archivo" font-size="5.5" font-weight="700" fill="#1C2B42">Parking</text>
        <text x="21" y="32" text-anchor="middle"
              font-family="Archivo" font-size="5.5" font-weight="700" fill="#A8C4DD">10&#8364;</text>
      </g>
    </g>

    <!-- Savings Packs subtitle -->
    <text id="packs-title" x="49.5" y="148" text-anchor="middle"
          font-family="Clash Display" font-size="9" font-weight="600" fill="#1C2B42">
      Savings Packs
    </text>

    <!-- Pack cards -->
    <g id="savings-packs">
      <!-- Basic Pack -->
      <g id="pack-basic" transform="translate(5, 152)">
        <rect x="0" y="0" width="89" height="14" rx="2" ry="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.3"/>
        <text x="3" y="5.5" font-family="Archivo" font-size="4.5" font-weight="700" fill="#1C2B42">Basic Pack</text>
        <text x="3" y="10" font-family="Archivo" font-size="3.5" font-weight="400" fill="#64748b">Cooler + Snorkel</text>
        <text x="86" y="5.5" text-anchor="end"
              font-family="Archivo" font-size="5" font-weight="700" fill="#A8C4DD">10&#8364;</text>
        <text x="86" y="10" text-anchor="end"
              font-family="Archivo" font-size="3.5" font-weight="400" fill="#94a3b8" text-decoration="line-through">12.50&#8364;</text>
      </g>

      <!-- Premium Pack -->
      <g id="pack-premium" transform="translate(5, 168)">
        <rect x="0" y="0" width="89" height="14" rx="2" ry="2" fill="#ffffff" stroke="#A8C4DD" stroke-width="0.5"/>
        <text x="3" y="5.5" font-family="Archivo" font-size="4.5" font-weight="700" fill="#1C2B42">Premium Pack</text>
        <text x="3" y="10" font-family="Archivo" font-size="3.5" font-weight="400" fill="#64748b">Cooler + Snorkel + Paddle Board</text>
        <text x="86" y="5.5" text-anchor="end"
              font-family="Archivo" font-size="5" font-weight="700" fill="#A8C4DD">30&#8364;</text>
        <text x="86" y="10" text-anchor="end"
              font-family="Archivo" font-size="3.5" font-weight="400" fill="#94a3b8" text-decoration="line-through">37.50&#8364;</text>
      </g>

      <!-- Adventure Pack -->
      <g id="pack-adventure" transform="translate(5, 184)">
        <rect x="0" y="0" width="89" height="14" rx="2" ry="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.3"/>
        <text x="3" y="5.5" font-family="Archivo" font-size="4.5" font-weight="700" fill="#1C2B42">Adventure Pack</text>
        <text x="3" y="10" font-family="Archivo" font-size="3.5" font-weight="400" fill="#64748b">Cooler + Snorkel + Paddle + Seascooter</text>
        <text x="86" y="5.5" text-anchor="end"
              font-family="Archivo" font-size="5" font-weight="700" fill="#A8C4DD">75&#8364;</text>
        <text x="86" y="10" text-anchor="end"
              font-family="Archivo" font-size="3.5" font-weight="400" fill="#94a3b8" text-decoration="line-through">87.50&#8364;</text>
      </g>
    </g>

    <!-- Bottom banner -->
    <g id="extras-bottom-banner">
      <rect x="0" y="201" width="99" height="9" fill="#1C2B42"/>
      <text x="49.5" y="206" text-anchor="middle"
            font-family="Archivo" font-size="4" font-weight="500" fill="#ffffff">
        Port of Blanes, Girona
      </text>
      <text x="49.5" y="209.5" text-anchor="middle"
            font-family="Archivo" font-size="3.5" font-weight="400" fill="#A8C4DD">
        2026
      </text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL 2: BACK COVER (x=99mm, 99mm x 210mm) — White bg       -->
  <!-- ============================================================ -->
  <g id="panel-back-cover" transform="translate(99,0)">
    <rect id="panel-back-bg" x="0" y="0" width="99" height="210" fill="#ffffff"/>

    <!-- Photo -->
    <g id="back-photo">
      <image id="back-photo-img"
             href="../client/public/images/boats/pacific-craft/alquiler-barco-pacific-craft-625-rent-a-boat-costa-brava-blanes-cala-costa-brava.webp"
             x="5" y="8" width="89" height="70"
             preserveAspectRatio="xMidYMid slice"/>
    </g>

    <!-- Title -->
    <text id="back-title" x="49.5" y="90" text-anchor="middle"
          font-family="Clash Display" font-size="11" font-weight="600" fill="#1C2B42">
      Your adventure
    </text>
    <text x="49.5" y="101" text-anchor="middle"
          font-family="Clash Display" font-size="11" font-weight="600" fill="#1C2B42">
      starts here
    </text>

    <!-- Contact info -->
    <g id="back-contact" transform="translate(10, 112)">
      <!-- Phone -->
      <text x="0" y="0" font-family="Archivo" font-size="5" font-weight="600" fill="#1C2B42">
        +34 611 500 372
      </text>
      <!-- Email -->
      <text x="0" y="9" font-family="Archivo" font-size="4.5" font-weight="400" fill="#64748b">
        costabravarentaboat@gmail.com
      </text>
      <!-- Web -->
      <text x="0" y="18" font-family="Archivo" font-size="4.5" font-weight="400" fill="#64748b">
        www.costabravarentaboat.com
      </text>
      <!-- Instagram -->
      <text x="0" y="27" font-family="Archivo" font-size="4.5" font-weight="400" fill="#64748b">
        @costabravarentaboat
      </text>
      <!-- Location -->
      <text x="0" y="36" font-family="Archivo" font-size="4.5" font-weight="400" fill="#64748b">
        Port of Blanes, Girona, Spain
      </text>
    </g>

    <!-- Rating -->
    <g id="back-rating" transform="translate(0, 160)">
      <text x="49.5" y="0" text-anchor="middle"
            font-family="Archivo" font-size="8" font-weight="700" fill="#fbbf24">
        &#9733;&#9733;&#9733;&#9733;&#9733;
      </text>
      <text x="49.5" y="8" text-anchor="middle"
            font-family="Archivo" font-size="4.5" font-weight="600" fill="#1C2B42">
        4.8/5 on Google &#8212; 200+ reviews
      </text>
    </g>

    <!-- Season banner -->
    <g id="back-season-banner">
      <rect x="5" y="180" width="89" height="12" rx="2" ry="2" fill="#1C2B42"/>
      <text x="49.5" y="187.5" text-anchor="middle"
            font-family="Archivo" font-size="5" font-weight="600" fill="#ffffff">
        Season: April &#8211; October 2026
      </text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL 3: COVER (x=198mm, 99mm x 210mm) — Navy background    -->
  <!-- ============================================================ -->
  <g id="panel-cover" transform="translate(198,0)">
    <rect id="panel-cover-bg" x="0" y="0" width="99" height="210" fill="#1C2B42"/>

    <!-- Logo placeholder -->
    <g id="logo" transform="translate(24, 14)">
      <rect x="0" y="0" width="51" height="18" rx="2" ry="2" fill="none"/>
      <!-- Purple accent bar -->
      <rect x="0" y="0" width="4" height="18" rx="1" ry="1" fill="#b6a6d0"/>
      <!-- Logo text -->
      <text x="8" y="7" font-family="Clash Display" font-size="5.5" font-weight="700" fill="#ffffff" letter-spacing="0.5">
        COSTA BRAVA
      </text>
      <text x="8" y="14" font-family="Clash Display" font-size="5.5" font-weight="700" fill="#ffffff" letter-spacing="0.5">
        RENT A BOAT
      </text>
    </g>

    <!-- Title -->
    <text id="cover-title" x="49.5" y="46" text-anchor="middle"
          font-family="Clash Display" font-size="13" font-weight="700" fill="#ffffff">
      Boat Rental
    </text>

    <!-- Subtitle -->
    <text id="cover-subtitle" x="49.5" y="56" text-anchor="middle"
          font-family="Archivo" font-size="6" font-weight="400" fill="#A8C4DD">
      Costa Brava &#183; Blanes &#183; 2026
    </text>

    <!-- Photo -->
    <g id="cover-photo">
      <image id="cover-photo-img"
             href="../client/public/images/boats/pacific-craft/alquiler-barco-pacific-craft-625-rent-a-boat-costa-brava-blanes-cala-agua-cristalina.webp"
             x="5" y="64" width="89" height="95"
             preserveAspectRatio="xMidYMid slice"/>
    </g>

    <!-- Flags / Languages -->
    <g id="cover-flags" transform="translate(49.5, 170)">
      <text x="0" y="0" text-anchor="middle"
            font-family="Archivo" font-size="7" fill="#ffffff">
        &#127466;&#127480; &#127468;&#127463; &#127467;&#127479; &#127465;&#127466; &#127470;&#127481; &#127475;&#127473; &#127477;&#127481; &#127479;&#127482;
      </text>
    </g>

    <!-- Contact bottom -->
    <g id="cover-contact" transform="translate(49.5, 186)">
      <text x="0" y="0" text-anchor="middle"
            font-family="Archivo" font-size="5" font-weight="600" fill="#ffffff">
        +34 611 500 372
      </text>
      <text x="0" y="8" text-anchor="middle"
            font-family="Archivo" font-size="4.5" font-weight="400" fill="#A8C4DD">
        www.costabravarentaboat.com
      </text>
    </g>
  </g>

</svg>
